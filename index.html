<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUICK</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .menu-btn {
      font-size: 30px;
      cursor: pointer;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: -250px;
      top: 0;
      width: 250px;
      height: 100%;
      background: #111827;
      transition: 0.4s;
      z-index: 999;
      padding-top: 70px;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 15px 25px;
      font-size: 18px;
    }

    .sidebar a:hover {
      background: #2563eb;
    }

    /* Hero */
    .hero {
      margin-top: 80px;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #cbd5e1;
    }

    /* PhonePe Style Scroll */
    .scroll-container {
      margin-top: 30px;
      display: flex;
      overflow-x: auto;
      gap: 20px;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .card {
      min-width: 300px;
      background: #1e293b;
      border-radius: 25px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card-content h2 {
      margin-bottom: 10px;
    }

    .card-content p {
      color: #d1d5db;
      margin-bottom: 15px;
    }

    .card-content a {
      display: inline-block;
      padding: 10px 18px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 12px;
    }

    .card-content a:hover {
      background: #1d4ed8;
    }

    /* Admin Panel */
    .admin-panel {
      display: none;
      margin: 30px auto;
      width: 90%;
      max-width: 500px;
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
    }

    .admin-panel input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
    }

    .admin-panel button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .admin-panel button:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">QUICK</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <a href="#">🏠 Home</a>
    <a href="#" onclick="showAdmin()">⚙ Admin Panel</a>
    <a href="#">📞 Contact</a>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>Welcome to QUICK</h1>
    <p>Fast access to all your websites</p>
  </div>

  <!-- Scrolling Cards -->
  <div class="scroll-container">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3" alt="Website 1">
      <div class="card-content">
        <h2>Website 1</h2>
        <p>Your first web app.</p>
        <a href="https://example1.com" target="_blank">Open</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="Website 2">
      <div class="card-content">
        <h2>Website 2</h2>
        <p>Your second web app.</p>
        <a href="https://example2.com" target="_blank">Open</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475" alt="Website 3">
      <div class="card-content">
        <h2>Website 3</h2>
        <p>Your third web app.</p>
        <a href="https://example3.com" target="_blank">Open</a>
      </div>
    </div>

  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <h2>Admin Panel</h2>
    <input type="text" placeholder="Website Name" />
    <input type="url" placeholder="Website Link" />
    <button>Save</button>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById('sidebar').classList.toggle('active');
    }

    function showAdmin() {
      document.getElementById('adminPanel').style.display = 'block';
    }
  </script>

</body>
</html>
